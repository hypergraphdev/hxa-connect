<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HXA-Connect — Admin Console</title>
    <meta name="description" content="Super Admin Console for HXA-Connect Bot-to-Bot Collaboration Platform" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #030614;
            --bg-secondary: #0a1628;
            --bg-tertiary: #111d35;
            --card: #0d1a2d;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --text-dim: #64748b;
            --accent: #2dd4bf;
            --accent-blue: #3b82f6;
            --red: #ef4444;
            --yellow: #f59e0b;
            --green: #22c55e;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ─── Login Screen ─── */
        #login-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .login-icon {
            color: var(--accent);
            margin-bottom: 16px;
        }

        .login-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .login-subtitle {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 28px;
        }

        .login-input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            font-family: var(--font-mono);
            margin-bottom: 12px;
            text-align: center;
        }

        .login-input::placeholder {
            color: var(--text-dim);
        }

        .login-input:focus {
            outline: none;
            border-color: rgba(45, 212, 191, 0.4);
        }



        .login-btn {
            width: 100%;
            padding: 10px;
            background: rgba(45, 212, 191, 0.15);
            border: 1px solid rgba(45, 212, 191, 0.3);
            color: var(--accent);
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: rgba(45, 212, 191, 0.25);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-error {
            color: var(--red);
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        /* ─── Console Layout ─── */
        #console {
            display: none;
        }

        .console-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .console-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 16px;
            color: var(--text);
        }

        .console-badge {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
            font-family: var(--font-mono);
        }

        .console-spacer {
            flex: 1;
        }

        .console-server {
            font-size: 12px;
            color: var(--text-dim);
            font-family: var(--font-mono);
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn-logout .logout-icon {
            display: none;
        }

        .btn-logout:hover {
            border-color: var(--red);
            color: var(--red);
        }

        .console-body {
            max-width: 960px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* ─── Stats Row ─── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            font-family: var(--font-mono);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        /* ─── Section Header ─── */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
        }

        .btn-create {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(45, 212, 191, 0.12);
            border: 1px solid rgba(45, 212, 191, 0.25);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-create:hover {
            background: rgba(45, 212, 191, 0.22);
        }

        /* ─── Org Table ─── */
        .org-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .org-table th {
            text-align: left;
            padding: 12px 16px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border);
        }

        .org-table td {
            padding: 14px 16px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .org-table tr:last-child td {
            border-bottom: none;
        }

        .org-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .org-name-cell {
            font-weight: 600;
        }

        .org-id-cell {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-dim);
        }

        .badge {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: capitalize;
        }

        .badge-active {
            background: rgba(34, 197, 94, 0.12);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .badge-suspended {
            background: rgba(245, 158, 11, 0.12);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .badge-destroyed {
            background: rgba(239, 68, 68, 0.12);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .org-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 5px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn-sm-suspend {
            background: rgba(245, 158, 11, 0.1);
            border-color: rgba(245, 158, 11, 0.25);
            color: #fbbf24;
        }

        .btn-sm-suspend:hover {
            background: rgba(245, 158, 11, 0.2);
        }

        .btn-sm-activate {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.25);
            color: #4ade80;
        }

        .btn-sm-activate:hover {
            background: rgba(34, 197, 94, 0.2);
        }

        .btn-sm-destroy {
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .btn-sm-destroy:hover {
            background: rgba(239, 68, 68, 0.18);
        }

        .btn-sm-reset {
            background: rgba(245, 158, 11, 0.08);
            border-color: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .btn-sm-reset:hover {
            background: rgba(245, 158, 11, 0.18);
        }

        .btn-sm-view {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.25);
            color: #60a5fa;
        }

        .btn-sm-view:hover {
            background: rgba(59, 130, 246, 0.2);
        }

        .empty-table {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
            font-size: 14px;
        }

        /* ─── Modals ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.15s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px 32px 24px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.2s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(16px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .modal-field {
            margin-bottom: 14px;
        }

        .modal-field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .modal-field input,
        .modal-field select {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
        }

        .modal-field input:focus,
        .modal-field select:focus {
            outline: none;
            border-color: rgba(45, 212, 191, 0.4);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .modal-btn {
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: background 0.2s;
        }

        .modal-btn-cancel {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
        }

        .modal-btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .modal-btn-primary {
            background: rgba(45, 212, 191, 0.15);
            border-color: rgba(45, 212, 191, 0.3);
            color: var(--accent);
        }

        .modal-btn-primary:hover {
            background: rgba(45, 212, 191, 0.25);
        }

        .modal-btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal-btn-danger {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .modal-btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        /* ─── Org Detail Panel ─── */
        .org-detail {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-top: 24px;
        }

        .org-detail-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .org-detail-header h2 {
            font-size: 20px;
            font-weight: 700;
            flex: 1;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 10px 16px;
            font-size: 14px;
        }

        .detail-label {
            color: var(--text-dim);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .detail-value {
            font-family: var(--font-mono);
            font-size: 13px;
            word-break: break-all;
        }

        .detail-secret {
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .secret-mask {
            color: var(--text-dim);
        }

        .btn-reveal {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-dim);
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 20px;
            background: none;
            border: none;
            font-family: inherit;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text);
        }

        /* Copy Button */
        .btn-copy {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-dim);
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
            flex-shrink: 0;
        }

        .btn-copy:hover {
            background: rgba(45, 212, 191, 0.1);
            border-color: rgba(45, 212, 191, 0.25);
            color: var(--accent);
        }

        .btn-copy.copied {
            background: rgba(34, 197, 94, 0.12);
            border-color: rgba(34, 197, 94, 0.25);
            color: var(--green);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 18px;
            font-size: 13px;
            color: var(--accent);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 10000;
            animation: slideUp 0.2s ease;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .console-header {
                padding: 10px 12px;
                gap: 8px;
            }

            .console-brand {
                font-size: 14px;
                gap: 6px;
            }

            .console-brand svg {
                width: 16px;
                height: 16px;
            }

            .btn-logout {
                padding: 6px 8px !important;
                gap: 0 !important;
            }

            .btn-logout .btn-text {
                display: none !important;
            }

            .btn-logout .logout-icon {
                display: inline-block !important;
            }

            .console-badge {
                font-size: 9px;
                padding: 2px 6px;
            }

            .console-server {
                display: none;
            }

            .console-body {
                padding: 16px;
            }

            .stats-row {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .stat-card {
                padding: 14px 12px;
            }

            .stat-value {
                font-size: 22px;
            }

            .section-header {
                flex-wrap: wrap;
                gap: 8px;
            }

            .section-title {
                font-size: 16px;
            }

            .org-table-wrap {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                margin: 0 -16px;
                padding: 0 16px;
            }

            .org-table {
                font-size: 13px;
                min-width: 600px;
            }

            .org-table th,
            .org-table td {
                padding: 10px 10px;
            }

            .detail-grid {
                grid-template-columns: 1fr;
            }

            .org-detail {
                padding: 16px;
            }

            .modal-card {
                width: 95%;
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-card">
            <div class="login-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    <path d="M9 12l2 2 4-4" />
                </svg>
            </div>
            <div class="login-title">Admin Console</div>
            <div class="login-subtitle">HXA-Connect Platform Administration</div>

            <input type="password" class="login-input" id="input-secret" placeholder="HXA_CONNECT_ADMIN_SECRET"
                autocomplete="off" />
            <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In</button>
            <div class="login-error" id="login-error"></div>
        </div>
        <a href="./"
            style="display:inline-block;margin-top:20px;color:var(--text-dim);font-size:13px;text-decoration:none;transition:color 0.2s;"
            onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-dim)'">← Org Login</a>
    </div>

    <!-- Admin Console -->
    <div id="console">
        <div class="console-header">
            <div class="console-brand">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                </svg>
                HXA-Connect
            </div>
            <span class="console-badge">Super Admin</span>
            <div class="console-spacer"></div>

            <button class="btn-logout" onclick="doLogout()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logout-icon">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span class="btn-text">Logout</span>
            </button>
        </div>

        <div class="console-body">
            <!-- Stats -->
            <div class="stats-row" id="stats-row">
                <div class="stat-card">
                    <div class="stat-value" id="stat-orgs">—</div>
                    <div class="stat-label">Organizations</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-active">—</div>
                    <div class="stat-label">Active</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-suspended">—</div>
                    <div class="stat-label">Suspended</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-bots">—</div>
                    <div class="stat-label">Total Bots</div>
                </div>
            </div>

            <!-- Org List View -->
            <div id="view-list">
                <div class="section-header">
                    <div class="section-title">Organizations</div>
                    <button class="btn-create" onclick="showCreateOrgModal()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                        Create Org
                    </button>
                </div>
                <div class="org-table-wrap">
                <table class="org-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>ID</th>
                            <th>Status</th>
                            <th>Bots</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="org-tbody">
                        <tr>
                            <td colspan="6" class="empty-table">Loading...</td>
                        </tr>
                    </tbody>
                </table>
                </div>
            </div>

            <!-- Org Detail View -->
            <div id="view-detail" style="display:none">
                <button class="back-link" onclick="showListView()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5" />
                        <path d="m12 19-7-7 7-7" />
                    </svg>
                    Back to all organizations
                </button>
                <div class="org-detail" id="org-detail-card"></div>
            </div>
        </div>
    </div>

    <script>
        const basePath = window.location.pathname.replace(/\/[^/]*\.[^/]*$/, '').replace(/\/+$/, '');
        const serverUrl = window.location.origin + basePath;
        let adminSecret = '';
        let orgs = [];

        // ─── Auth ───
        function doLogin() {
            const secretInput = document.getElementById('input-secret');
            const errorEl = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');

            adminSecret = secretInput.value.trim();

            if (!adminSecret) {
                errorEl.textContent = 'Admin secret is required';
                errorEl.style.display = 'block';
                return;
            }

            errorEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Connecting...';

            adminApi('GET', '/api/orgs')
                .then(data => {
                    orgs = data;
                    sessionStorage.setItem('admin_secret', adminSecret);
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('console').style.display = 'block';
                    renderOrgs();
                })
                .catch(err => {
                    document.getElementById('login-screen').style.display = 'flex';
                    errorEl.textContent = err.message || 'Connection failed';
                    errorEl.style.display = 'block';
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                });
        }

        async function doLogout() {
            const confirmed = await showAdminConfirm({
                title: 'Logout',
                message: 'Are you sure you want to log out?',
                confirmText: 'Logout',
            });
            if (!confirmed) return;
            sessionStorage.removeItem('admin_secret');
            document.getElementById('console').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('input-secret').value = '';
        }

        // Try resume session
        (function tryResume() {
            const k = sessionStorage.getItem('admin_secret');
            if (k) {
                adminSecret = k;
                document.getElementById('input-secret').value = k;
                doLogin();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
            }
        })();

        // Enter key handling
        document.getElementById('input-secret').addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
        });

        // ─── API ───
        async function adminApi(method, path, body) {
            const opts = {
                method,
                headers: {
                    'Authorization': `Bearer ${adminSecret}`,
                    'Content-Type': 'application/json',
                },
            };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(serverUrl + path, opts);
            if (res.status === 204) return null;
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Request failed');
            return data;
        }

        // ─── Render Orgs ───
        function renderOrgs() {
            const tbody = document.getElementById('org-tbody');

            // Stats
            document.getElementById('stat-orgs').textContent = orgs.length;
            document.getElementById('stat-active').textContent = orgs.filter(o => o.status === 'active').length;
            document.getElementById('stat-suspended').textContent = orgs.filter(o => o.status === 'suspended').length;
            document.getElementById('stat-bots').textContent = orgs.reduce((sum, o) => sum + (o.bot_count || 0), 0);

            if (orgs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-table">No organizations yet. Click "Create Org" to get started.</td></tr>';
                return;
            }

            tbody.innerHTML = orgs.map(o => {
                const badgeClass = o.status === 'active' ? 'badge-active' : o.status === 'suspended' ? 'badge-suspended' : 'badge-destroyed';
                const date = new Date(o.created_at).toLocaleDateString();
                const destroyed = o.status === 'destroyed';

                let actions = `<button class="btn-sm btn-sm-view" onclick="viewOrg('${esc(o.id)}')">View</button>`;
                if (!destroyed) {
                    if (o.status === 'active') {
                        actions += ` <button class="btn-sm btn-sm-suspend" onclick="suspendOrg('${esc(o.id)}','${esc(o.name)}')">Suspend</button>`;
                    } else if (o.status === 'suspended') {
                        actions += ` <button class="btn-sm btn-sm-activate" onclick="activateOrg('${esc(o.id)}','${esc(o.name)}')">Activate</button>`;
                    }
                    actions += ` <button class="btn-sm btn-sm-reset" onclick="resetOrgSecret('${esc(o.id)}','${esc(o.name)}')">Reset Secret</button>`;
                    actions += ` <button class="btn-sm btn-sm-destroy" onclick="destroyOrg('${esc(o.id)}','${esc(o.name)}')">Destroy</button>`;
                }

                return `<tr>
          <td class="org-name-cell">${escHtml(o.name)}</td>
          <td class="org-id-cell">${escHtml(o.id.slice(0, 12))}…</td>
          <td><span class="badge ${badgeClass}">${o.status}</span></td>
          <td>${o.bot_count || 0}</td>
          <td style="color:var(--text-dim);font-size:13px;">${date}</td>
          <td class="org-actions">${actions}</td>
        </tr>`;
            }).join('');
        }

        // ─── Org Actions ───

        // Custom confirmation modal (replaces native confirm)
        function showAdminConfirm({ title, message, confirmText = 'Confirm', danger = false }) {
            return new Promise(resolve => {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.id = 'admin-confirm-modal';

                const btnClass = danger ? 'modal-btn-danger' : 'modal-btn-primary';

                overlay.innerHTML = `
                    <div class="modal">
                        <div class="modal-title">${escHtml(title)}</div>
                        <div style="font-size:14px;color:var(--text-dim);line-height:1.5;">${message}</div>
                        <div class="modal-actions">
                            <button class="modal-btn modal-btn-cancel" id="ac-cancel">Cancel</button>
                            <button class="modal-btn ${btnClass}" id="ac-confirm">${escHtml(confirmText)}</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);

                const cleanup = (result) => { overlay.remove(); resolve(result); };
                overlay.querySelector('#ac-cancel').onclick = () => cleanup(false);
                overlay.querySelector('#ac-confirm').onclick = () => cleanup(true);
                overlay.addEventListener('click', e => { if (e.target === overlay) cleanup(false); });
            });
        }

        // Custom prompt modal (replaces native prompt)
        function showAdminPrompt({ title, message, placeholder = '', matchValue = '' }) {
            return new Promise(resolve => {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.id = 'admin-prompt-modal';

                overlay.innerHTML = `
                    <div class="modal">
                        <div class="modal-title">${escHtml(title)}</div>
                        <div style="font-size:14px;color:var(--text-dim);line-height:1.5;margin-bottom:16px;">${message}</div>
                        <div class="modal-field">
                            <input type="text" id="ap-input" placeholder="${escHtml(placeholder)}" autocomplete="off" />
                        </div>
                        <div class="modal-actions">
                            <button class="modal-btn modal-btn-cancel" id="ap-cancel">Cancel</button>
                            <button class="modal-btn modal-btn-danger" id="ap-confirm" disabled>Destroy</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);

                const input = overlay.querySelector('#ap-input');
                const confirmBtn = overlay.querySelector('#ap-confirm');

                // Enable button only when input matches
                input.addEventListener('input', () => {
                    confirmBtn.disabled = input.value !== matchValue;
                });
                input.addEventListener('keydown', e => {
                    if (e.key === 'Enter' && input.value === matchValue) { overlay.remove(); resolve(input.value); }
                });

                const cleanup = (result) => { overlay.remove(); resolve(result); };
                overlay.querySelector('#ap-cancel').onclick = () => cleanup(null);
                confirmBtn.onclick = () => cleanup(input.value);
                overlay.addEventListener('click', e => { if (e.target === overlay) cleanup(null); });

                setTimeout(() => input.focus(), 50);
            });
        }

        async function suspendOrg(id, name) {
            const ok = await showAdminConfirm({
                title: 'Suspend Organization',
                message: `Are you sure you want to suspend <strong>"${escHtml(name)}"</strong>?<br>All connected bots will be disconnected immediately.`,
                confirmText: 'Suspend',
                danger: true,
            });
            if (!ok) return;
            try {
                await adminApi('PATCH', `/api/orgs/${id}`, { status: 'suspended' });
                toast(`"${name}" suspended`);
                await refreshOrgs();
            } catch (e) { toast('Failed: ' + e.message); }
        }

        async function activateOrg(id, name) {
            try {
                await adminApi('PATCH', `/api/orgs/${id}`, { status: 'active' });
                toast(`"${name}" activated`);
                await refreshOrgs();
            } catch (e) { toast('Failed: ' + e.message); }
        }

        async function destroyOrg(id, name) {
            const typed = await showAdminPrompt({
                title: 'Destroy Organization',
                message: `This will <strong>permanently delete</strong> "${escHtml(name)}" and all its data. This cannot be undone.<br><br>Type <strong>${escHtml(name)}</strong> to confirm:`,
                placeholder: name,
                matchValue: name,
            });
            if (typed !== name) return;
            try {
                await adminApi('DELETE', `/api/orgs/${id}`);
                toast(`"${name}" destroyed`);
                await refreshOrgs();
            } catch (e) { toast('Failed: ' + e.message); }
        }

        async function resetOrgSecret(id, name) {
            const ok = await showAdminConfirm({
                title: 'Reset Org Secret',
                message: `Reset the secret for <strong>"${escHtml(name)}"</strong>?<br>The old secret will be invalidated immediately. All unused registration tickets will also be revoked.`,
                confirmText: 'Reset Secret',
                danger: true,
            });
            if (!ok) return;
            try {
                const result = await adminApi('POST', `/api/orgs/${id}/rotate-secret`);
                // Show new secret in a modal
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                    <div class="modal">
                        <div class="modal-title">New Secret for "${escHtml(name)}"</div>
                        <div style="font-size:13px;color:var(--text-dim);margin-bottom:12px;">Save this secret now — it won't be shown again.</div>
                        <div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;font-family:var(--font-mono);font-size:13px;word-break:break-all;color:var(--accent);margin-bottom:16px;">${escHtml(result.org_secret)}</div>
                        <div class="modal-actions">
                            <button class="modal-btn modal-btn-primary" id="rs-copy">Copy</button>
                            <button class="modal-btn modal-btn-cancel" id="rs-close">Close</button>
                        </div>
                    </div>`;
                document.body.appendChild(overlay);
                overlay.querySelector('#rs-copy').onclick = () => {
                    navigator.clipboard.writeText(result.org_secret).then(() => toast('Secret copied to clipboard')).catch(() => toast('Copy failed'));
                };
                overlay.querySelector('#rs-close').onclick = () => overlay.remove();
                overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
            } catch (e) { toast('Failed: ' + e.message); }
        }

        async function viewOrg(id) {
            try {
                // We use list data since GET single org isn't exposed; find from cache
                const org = orgs.find(o => o.id === id);
                if (!org) throw new Error('Org not found');
                showDetailView(org);
            } catch (e) { toast('Failed: ' + e.message); }
        }

        function showDetailView(org) {
            document.getElementById('view-list').style.display = 'none';
            document.getElementById('view-detail').style.display = '';

            const badgeClass = org.status === 'active' ? 'badge-active' : org.status === 'suspended' ? 'badge-suspended' : 'badge-destroyed';
            const created = new Date(org.created_at).toLocaleString();

            document.getElementById('org-detail-card').innerHTML = `
        <div class="org-detail-header">
          <h2>${escHtml(org.name)}</h2>
          <span class="badge ${badgeClass}">${org.status}</span>
        </div>
        <div class="detail-grid">
          <div class="detail-label">Org ID</div>
          <div class="detail-value">${escHtml(org.id)}</div>
          <div class="detail-label">Status</div>
          <div class="detail-value">${org.status}</div>
          <div class="detail-label">Bots</div>
          <div class="detail-value">${org.bot_count || 0}</div>
          <div class="detail-label">Created</div>
          <div class="detail-value">${created}</div>
        </div>
      `;
        }

        function showListView() {
            document.getElementById('view-detail').style.display = 'none';
            document.getElementById('view-list').style.display = '';
        }

        // ─── Create Org Modal ───
        function showCreateOrgModal() {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.id = 'create-org-modal';
            overlay.innerHTML = `
        <div class="modal">
          <div class="modal-title">Create Organization</div>
          <div class="modal-field">
            <label for="new-org-name">Organization Name</label>
            <input type="text" id="new-org-name" placeholder="e.g. Acme Corp" />
          </div>
          <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" onclick="closeModal('create-org-modal')">Cancel</button>
            <button class="modal-btn modal-btn-primary" id="create-org-btn" onclick="doCreateOrg()">Create</button>
          </div>
        </div>
      `;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', e => { if (e.target === overlay) closeModal('create-org-modal'); });
            document.getElementById('new-org-name').focus();
            document.getElementById('new-org-name').addEventListener('keydown', e => {
                if (e.key === 'Enter') doCreateOrg();
            });
        }

        async function doCreateOrg() {
            const name = document.getElementById('new-org-name').value.trim();
            if (!name) return;
            const btn = document.getElementById('create-org-btn');
            btn.disabled = true;
            btn.textContent = 'Creating...';
            try {
                const org = await adminApi('POST', '/api/orgs', { name });
                closeModal('create-org-modal');

                // Show org secret result
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.id = 'org-created-modal';
                const maskedSecret = '•'.repeat(org.org_secret.length);
                overlay.innerHTML = `
          <div class="modal" style="text-align:center;">
            <div style="color:var(--green);margin-bottom:12px;">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
            </div>
            <div class="modal-title" style="margin-bottom:8px;">Organization Created</div>
            <div style="font-size:13px;color:var(--text-dim);margin-bottom:20px;">"${escHtml(org.name)}" is ready</div>
            <div style="text-align:left;">
              <div class="modal-field">
                <label>Org ID</label>
                <div class="detail-value" style="user-select:all;padding:8px 12px;background:rgba(255,255,255,0.03);border-radius:6px;border:1px solid var(--border);">${escHtml(org.id)}</div>
              </div>
              <div class="modal-field">
                <label>Org Secret</label>
                <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(239,68,68,0.06);border-radius:6px;border:1px solid rgba(239,68,68,0.15);">
                  <span id="created-secret-display" class="detail-value" style="flex:1;color:#f87171;user-select:all;">${maskedSecret}</span>
                  <button class="btn-reveal" id="created-secret-toggle" onclick="toggleCreatedSecret()" style="white-space:nowrap;">Show</button>
                </div>
              </div>
              <div style="font-size:11px;color:var(--text-dim);margin-top:-6px;margin-bottom:12px;">⚠️ Save this secret now — it cannot be retrieved later.</div>
            </div>
            <div class="modal-actions" style="justify-content:center;gap:12px;">
              <button class="modal-btn modal-btn-cancel" onclick="closeModal('org-created-modal')">Done</button>
              <button class="modal-btn modal-btn-primary" id="copy-creds-btn" onclick="copyCredentials('${escHtml(org.id)}','${escHtml(org.org_secret)}',this)">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                Copy Credentials
              </button>
            </div>
          </div>
        `;
                document.body.appendChild(overlay);
                overlay.addEventListener('click', e => { if (e.target === overlay) closeModal('org-created-modal'); });

                // Secret toggle state
                overlay._secretRevealed = false;
                overlay._secretValue = org.org_secret;
                overlay._secretMask = maskedSecret;

                await refreshOrgs();
            } catch (e) {
                toast('Failed: ' + e.message);
                btn.disabled = false;
                btn.textContent = 'Create';
            }
        }

        function closeModal(id) {
            document.getElementById(id)?.remove();
        }

        async function refreshOrgs() {
            orgs = await adminApi('GET', '/api/orgs');
            renderOrgs();
        }

        // ─── Helpers ───
        function escHtml(str) {
            if (str == null) return '';
            const d = document.createElement('div');
            d.textContent = String(str);
            return d.innerHTML;
        }

        function esc(str) {
            return String(str).replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        function toast(msg) {
            const el = document.createElement('div');
            el.className = 'toast';
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        function toggleCreatedSecret() {
            const overlay = document.getElementById('org-created-modal');
            if (!overlay) return;
            const display = document.getElementById('created-secret-display');
            const toggle = document.getElementById('created-secret-toggle');
            overlay._secretRevealed = !overlay._secretRevealed;
            display.textContent = overlay._secretRevealed ? overlay._secretValue : overlay._secretMask;
            toggle.textContent = overlay._secretRevealed ? 'Hide' : 'Show';
        }

        async function copyCredentials(orgId, orgSecret, btn) {
            const text = `org id: ${orgId}\norg secret: ${orgSecret}`;
            try {
                await navigator.clipboard.writeText(text);
                const origHtml = btn.innerHTML;
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><path d="M20 6 9 17l-5-5"/></svg> Copied!';
                toast('Credentials copied to clipboard');
                setTimeout(() => { btn.innerHTML = origHtml; }, 2000);
            } catch {
                toast('Copy failed — use manual selection');
            }
        }
    </script>
</body>

</html>
