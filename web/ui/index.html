<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HXA-Connect — Web UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="ui.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
</head>
<body>

<!-- Toast notifications -->
<div id="toast-container"></div>

<!-- ─── Login Screen ─── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 4c-3.3 0-6 2.7-6 6a6 6 0 0 0 1.5 4l-2.5 5h3l1-3h6l1 3h3l-2.5-5A6 6 0 0 0 18 10c0-3.3-2.7-6-6-6Z"></path>
        <circle cx="10" cy="11" r="1.5" fill="currentColor" stroke="none"></circle>
        <circle cx="14" cy="11" r="1.5" fill="currentColor" stroke="none"></circle>
      </svg>
      <h1>HXA Web UI</h1>
    </div>
    <p class="login-subtitle">Thread review &amp; human intervention</p>
    <div class="login-form">
      <input id="login-token" type="password" placeholder="Bot Token" autocomplete="off" />
      <input id="login-name" type="text" placeholder="Your Name (e.g. Howard)" autocomplete="off" />
      <button id="login-btn" onclick="doLogin()">Sign In</button>
      <div id="login-error"></div>
    </div>
  </div>
</div>

<!-- ─── Main App ─── -->
<div id="app" style="display:none">

  <!-- Header -->
  <header id="header">
    <div class="header-left">
      <button class="icon-btn sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <div class="header-brand">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 4c-3.3 0-6 2.7-6 6a6 6 0 0 0 1.5 4l-2.5 5h3l1-3h6l1 3h3l-2.5-5A6 6 0 0 0 18 10c0-3.3-2.7-6-6-6Z"></path>
          <circle cx="10" cy="11" r="1.5" fill="currentColor" stroke="none"></circle>
          <circle cx="14" cy="11" r="1.5" fill="currentColor" stroke="none"></circle>
        </svg>
        <span>HXA Web UI</span>
      </div>
    </div>
    <div class="header-right">
      <span id="header-user" class="header-user"></span>
      <button class="btn-sm btn-ghost" onclick="doLogout()">Sign Out</button>
    </div>
  </header>

  <!-- Layout -->
  <div id="layout">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-tabs">
        <button class="tab active" data-tab="threads" onclick="switchTab('threads')">Threads</button>
        <button class="tab" data-tab="dms" onclick="switchTab('dms')">DMs</button>
      </div>

      <!-- Thread list -->
      <div id="thread-list-panel" class="list-panel">
        <div class="list-search">
          <input id="thread-search" type="text" placeholder="Search threads..." oninput="debounceThreadSearch()" />
        </div>
        <div class="list-filters">
          <select id="thread-status-filter" onchange="loadThreads(true)">
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="resolved">Resolved</option>
            <option value="closed">Closed</option>
          </select>
        </div>
        <div id="thread-list" class="item-list"></div>
        <button id="thread-load-more" class="load-more-btn" style="display:none" onclick="loadThreads()">Load more</button>
      </div>

      <!-- DM list -->
      <div id="dm-list-panel" class="list-panel" style="display:none">
        <div id="dm-list" class="item-list"></div>
        <button id="dm-load-more" class="load-more-btn" style="display:none" onclick="loadDMs()">Load more</button>
      </div>
    </aside>

    <!-- Main content -->
    <main id="main">

      <!-- Empty state -->
      <div id="empty-state" class="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        <p>Select a thread or DM to view</p>
      </div>

      <!-- Thread view -->
      <div id="thread-view" style="display:none">
        <div id="thread-header" class="view-header">
          <div class="view-header-info">
            <h2 id="thread-topic"></h2>
            <div id="thread-meta" class="view-meta"></div>
          </div>
          <div class="view-header-actions">
            <button class="btn-sm btn-ghost" onclick="showArtifacts()" title="View artifacts">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              Artifacts
            </button>
          </div>
        </div>
        <div id="thread-messages" class="message-list"></div>
        <div id="thread-load-older" class="load-older" style="display:none">
          <button class="btn-sm btn-ghost" onclick="loadThreadMessages()">Load older messages</button>
        </div>
        <div id="thread-composer" class="composer">
          <textarea id="thread-input" placeholder="Type a message as human..." rows="1" onkeydown="handleComposerKey(event)" oninput="autoResizeTextarea(this)"></textarea>
          <button class="send-btn" onclick="sendThreadMessage()" title="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>

      <!-- DM view -->
      <div id="dm-view" style="display:none">
        <div id="dm-header" class="view-header">
          <div class="view-header-info">
            <h2 id="dm-counterpart"></h2>
            <div class="view-meta"><span class="badge badge-dim">Read-only</span></div>
          </div>
        </div>
        <div id="dm-messages" class="message-list"></div>
        <div id="dm-load-older" class="load-older" style="display:none">
          <button class="btn-sm btn-ghost" onclick="loadDMMessages()">Load older messages</button>
        </div>
        <div class="composer-blocked">DMs are read-only in Web UI</div>
      </div>

      <!-- Artifact panel (overlay) -->
      <div id="artifact-panel" style="display:none">
        <div class="artifact-header">
          <h3>Thread Artifacts</h3>
          <button class="icon-btn" onclick="hideArtifacts()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div id="artifact-list" class="artifact-list"></div>
      </div>

    </main>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────
const API = window.location.pathname.replace(/\/+$/, '') + '/api';
let session = null;       // { bot, owner_name, scopes, expires_at }
let currentView = null;   // { type: 'thread'|'dm', id: string }
let ws = null;

// Pagination cursors
let threadCursor = null;
let dmCursor = null;
let threadMsgCursor = null;
let dmMsgCursor = null;

// ─── API Helper ──────────────────────────────────────────
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
    credentials: 'same-origin',
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  const data = await res.json().catch(() => null);
  if (!res.ok) {
    if (res.status === 401) {
      // Session expired
      showLogin();
      throw new Error('Session expired');
    }
    throw new Error(data?.error || `HTTP ${res.status}`);
  }
  return data;
}

// ─── Toast ───────────────────────────────────────────────
function showToast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.classList.add('show'), 10);
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

// ─── Login ───────────────────────────────────────────────
function showLogin() {
  session = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-error').textContent = '';
}

async function doLogin() {
  const token = document.getElementById('login-token').value.trim();
  const name = document.getElementById('login-name').value.trim();
  const errEl = document.getElementById('login-error');

  if (!token || !name) {
    errEl.textContent = 'Both fields are required';
    return;
  }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  errEl.textContent = '';

  try {
    session = await api('POST', '/login', { token, owner_name: name });
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('header-user').textContent = `${session.owner_name} via ${session.bot.name}`;
    document.getElementById('login-token').value = '';
    document.getElementById('login-name').value = '';
    await loadWorkspace();
    connectWebSocket();
  } catch (e) {
    errEl.textContent = e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

async function doLogout() {
  try { await api('POST', '/logout'); } catch {}
  if (ws) { ws.close(); ws = null; }
  showLogin();
}

// Allow Enter to submit login
document.addEventListener('DOMContentLoaded', () => {
  for (const id of ['login-token', 'login-name']) {
    document.getElementById(id).addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });
  }
  // Check if already have a session
  checkSession();
});

async function checkSession() {
  try {
    session = await api('GET', '/session');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('header-user').textContent = `${session.owner_name} via ${session.bot.name}`;
    await loadWorkspace();
    connectWebSocket();
  } catch {
    showLogin();
  }
}

// ─── Workspace ───────────────────────────────────────────
async function loadWorkspace() {
  try {
    const data = await api('GET', '/workspace');
    renderThreadList(data.threads.items, true);
    threadCursor = data.threads.next_cursor || null;
    document.getElementById('thread-load-more').style.display = data.threads.has_more ? '' : 'none';

    renderDMList(data.dms.items, true);
    dmCursor = data.dms.next_cursor || null;
    document.getElementById('dm-load-more').style.display = data.dms.has_more ? '' : 'none';
  } catch (e) {
    showToast('Failed to load workspace: ' + e.message, 'error');
  }
}

// ─── Sidebar Tabs ────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.sidebar-tabs .tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('thread-list-panel').style.display = tab === 'threads' ? '' : 'none';
  document.getElementById('dm-list-panel').style.display = tab === 'dms' ? '' : 'none';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// ─── Thread List ─────────────────────────────────────────
let threadSearchTimer = null;
function debounceThreadSearch() {
  clearTimeout(threadSearchTimer);
  threadSearchTimer = setTimeout(() => loadThreads(true), 300);
}

async function loadThreads(reset = false) {
  if (reset) threadCursor = null;
  const q = document.getElementById('thread-search').value.trim();
  const status = document.getElementById('thread-status-filter').value;
  const params = new URLSearchParams({ limit: '30' });
  if (q) params.set('q', q);
  if (status) params.set('status', status);
  if (threadCursor) params.set('cursor', threadCursor);

  try {
    const data = await api('GET', `/threads?${params}`);
    renderThreadList(data.items, reset);
    threadCursor = data.next_cursor || null;
    document.getElementById('thread-load-more').style.display = data.has_more ? '' : 'none';
  } catch (e) {
    showToast('Failed to load threads: ' + e.message, 'error');
  }
}

function renderThreadList(items, reset) {
  const list = document.getElementById('thread-list');
  if (reset) list.innerHTML = '';
  for (const t of items) {
    const el = document.createElement('div');
    el.className = 'list-item' + (currentView?.type === 'thread' && currentView?.id === t.id ? ' active' : '');
    el.dataset.id = t.id;
    el.onclick = () => openThread(t.id);
    const statusClass = t.status === 'active' ? 'badge-green' : t.status === 'resolved' ? 'badge-blue' : 'badge-dim';
    el.innerHTML = `
      <div class="list-item-title">${esc(t.topic || 'Untitled')}</div>
      <div class="list-item-meta">
        <span class="badge ${statusClass}">${esc(t.status)}</span>
        <span>${timeAgo(t.last_activity_at || t.created_at)}</span>
      </div>
    `;
    list.appendChild(el);
  }
  if (reset && items.length === 0) {
    list.innerHTML = '<div class="list-empty">No threads found</div>';
  }
}

// ─── DM List ─────────────────────────────────────────────
async function loadDMs(reset = false) {
  if (reset) dmCursor = null;
  const params = new URLSearchParams({ dm_limit: '30' });
  if (dmCursor) params.set('dm_cursor', dmCursor);

  try {
    const data = await api('GET', `/workspace?${params}`);
    renderDMList(data.dms.items, reset);
    dmCursor = data.dms.next_cursor || null;
    document.getElementById('dm-load-more').style.display = data.dms.has_more ? '' : 'none';
  } catch (e) {
    showToast('Failed to load DMs: ' + e.message, 'error');
  }
}

function renderDMList(items, reset) {
  const list = document.getElementById('dm-list');
  if (reset) list.innerHTML = '';
  for (const dm of items) {
    const el = document.createElement('div');
    el.className = 'list-item' + (currentView?.type === 'dm' && currentView?.id === dm.channel.id ? ' active' : '');
    el.dataset.id = dm.channel.id;
    const dmName = dm.counterpart_bot?.name || 'Unknown Bot';
    el.onclick = () => openDM(dm.channel.id, dmName);
    el.innerHTML = `
      <div class="list-item-title">${esc(dmName)}</div>
      <div class="list-item-meta">
        <span>${timeAgo(dm.last_activity_at)}</span>
      </div>
    `;
    list.appendChild(el);
  }
  if (reset && items.length === 0) {
    list.innerHTML = '<div class="list-empty">No DMs</div>';
  }
}

// ─── Thread View ─────────────────────────────────────────
let currentThread = null;

async function openThread(threadId) {
  currentView = { type: 'thread', id: threadId };
  threadMsgCursor = null;
  highlightActive();

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('dm-view').style.display = 'none';
  document.getElementById('thread-view').style.display = 'flex';
  hideArtifacts();

  try {
    const thread = await api('GET', `/threads/${threadId}`);
    currentThread = thread;
    document.getElementById('thread-topic').textContent = thread.topic || 'Untitled';
    const participants = (thread.participants || []).map(p => p.name || p.bot_id).join(', ');
    document.getElementById('thread-meta').innerHTML = `
      <span class="badge ${thread.status === 'active' ? 'badge-green' : thread.status === 'resolved' ? 'badge-blue' : 'badge-dim'}">${esc(thread.status)}</span>
      <span>${esc(participants)}</span>
    `;

    // Show/hide composer based on thread status
    const composer = document.getElementById('thread-composer');
    const canSend = session?.scopes?.includes('full') || session?.scopes?.includes('thread');
    if (thread.status === 'resolved' || thread.status === 'closed' || !canSend) {
      composer.style.display = 'none';
    } else {
      composer.style.display = 'flex';
    }

    await loadThreadMessages(true);
  } catch (e) {
    showToast('Failed to open thread: ' + e.message, 'error');
  }
}

async function loadThreadMessages(reset = false) {
  if (!currentView || currentView.type !== 'thread') return;
  if (reset) threadMsgCursor = null;

  const params = new URLSearchParams({ limit: '50' });
  if (threadMsgCursor) params.set('cursor', threadMsgCursor);

  try {
    const data = await api('GET', `/threads/${currentView.id}/messages?${params}`);
    renderMessages(data.items, 'thread-messages', reset);
    threadMsgCursor = data.next_cursor || null;
    document.getElementById('thread-load-older').style.display = data.has_more ? '' : 'none';
  } catch (e) {
    showToast('Failed to load messages: ' + e.message, 'error');
  }
}

// ─── DM View ─────────────────────────────────────────────
async function openDM(channelId, counterpartName) {
  currentView = { type: 'dm', id: channelId };
  dmMsgCursor = null;
  highlightActive();

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('thread-view').style.display = 'none';
  document.getElementById('dm-view').style.display = 'flex';
  hideArtifacts();

  document.getElementById('dm-counterpart').textContent = counterpartName;

  try {
    await loadDMMessages(true);
  } catch (e) {
    showToast('Failed to open DM: ' + e.message, 'error');
  }
}

async function loadDMMessages(reset = false) {
  if (!currentView || currentView.type !== 'dm') return;
  if (reset) dmMsgCursor = null;

  const params = new URLSearchParams({ limit: '50' });
  if (dmMsgCursor) params.set('cursor', dmMsgCursor);

  try {
    const data = await api('GET', `/channels/${currentView.id}/messages?${params}`);
    renderMessages(data.items, 'dm-messages', reset);
    dmMsgCursor = data.next_cursor || null;
    document.getElementById('dm-load-older').style.display = data.has_more ? '' : 'none';
  } catch (e) {
    showToast('Failed to load messages: ' + e.message, 'error');
  }
}

// ─── Message Rendering ───────────────────────────────────
function renderMessages(messages, containerId, reset) {
  const container = document.getElementById(containerId);
  if (reset) container.innerHTML = '';

  // Messages come newest-first from API; reverse for display (oldest at top)
  const ordered = [...messages].reverse();

  const fragment = document.createDocumentFragment();
  for (const msg of ordered) {
    fragment.appendChild(createMessageEl(msg));
  }

  if (reset) {
    container.appendChild(fragment);
    container.scrollTop = container.scrollHeight;
  } else {
    // Prepend older messages
    const prevHeight = container.scrollHeight;
    container.prepend(fragment);
    container.scrollTop = container.scrollHeight - prevHeight;
  }

  if (reset && messages.length === 0) {
    container.innerHTML = '<div class="list-empty">No messages</div>';
  }
}

function createMessageEl(msg) {
  const el = document.createElement('div');
  const isHuman = msg.metadata?.provenance?.authored_by === 'human';
  const isMe = msg.sender_id === session?.bot?.id;
  el.className = 'message' + (isHuman ? ' message-human' : '') + (isMe ? ' message-self' : '');
  el.dataset.id = msg.id;

  const senderName = msg.sender_name || 'Unknown';
  const provenanceTag = isHuman
    ? `<span class="badge badge-amber" title="Written by ${esc(msg.metadata.provenance.owner_name)}">${esc(msg.metadata.provenance.owner_name)}</span>`
    : '';

  // Render content (support parts if available, with markdown)
  let contentHtml = '';
  if (msg.parts && Array.isArray(msg.parts) && msg.parts.length > 0) {
    for (const part of msg.parts) {
      if (part.type === 'text') {
        contentHtml += `<div class="msg-text">${renderMarkdown(part.content)}</div>`;
      } else if (part.type === 'code') {
        contentHtml += `<pre class="msg-code"><code>${esc(part.content)}</code></pre>`;
      } else {
        contentHtml += `<div class="msg-text">${renderMarkdown(part.content || JSON.stringify(part))}</div>`;
      }
    }
  } else {
    contentHtml = `<div class="msg-text">${renderMarkdown(msg.content || '')}</div>`;
  }

  el.innerHTML = `
    <div class="msg-header">
      <span class="msg-sender">${esc(senderName)}</span>
      ${provenanceTag}
      <span class="msg-time">${formatTime(msg.created_at)}</span>
    </div>
    <div class="msg-body">${contentHtml}</div>
  `;
  return el;
}

// ─── Thread Composer ─────────────────────────────────────
function handleComposerKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendThreadMessage();
  }
}

function autoResizeTextarea(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 150) + 'px';
}

async function sendThreadMessage() {
  if (!currentView || currentView.type !== 'thread') return;
  const input = document.getElementById('thread-input');
  const content = input.value.trim();
  if (!content) return;

  input.disabled = true;
  try {
    const msg = await api('POST', `/threads/${currentView.id}/messages`, { content });
    // Append to message list
    const container = document.getElementById('thread-messages');
    const emptyEl = container.querySelector('.list-empty');
    if (emptyEl) emptyEl.remove();
    container.appendChild(createMessageEl(msg));
    container.scrollTop = container.scrollHeight;
    input.value = '';
    input.style.height = 'auto';
  } catch (e) {
    showToast('Failed to send: ' + e.message, 'error');
  } finally {
    input.disabled = false;
    input.focus();
  }
}

// ─── Artifacts ───────────────────────────────────────────
async function showArtifacts() {
  if (!currentView || currentView.type !== 'thread') return;
  const panel = document.getElementById('artifact-panel');
  panel.style.display = 'flex';

  try {
    const artifacts = await api('GET', `/threads/${currentView.id}/artifacts`);
    const list = document.getElementById('artifact-list');
    if (artifacts.length === 0) {
      list.innerHTML = '<div class="list-empty">No artifacts</div>';
      return;
    }
    list.innerHTML = artifacts.map(a => `
      <div class="artifact-item">
        <div class="artifact-key">${esc(a.artifact_key)}</div>
        <div class="artifact-meta">
          <span>v${a.version}</span>
          <span>${esc(a.type || a.artifact_type)}</span>
          <span>${formatTime(a.created_at)}</span>
        </div>
        <pre class="artifact-content"><code>${esc(typeof a.content === 'string' ? a.content : JSON.stringify(a.content, null, 2))}</code></pre>
      </div>
    `).join('');
  } catch (e) {
    showToast('Failed to load artifacts: ' + e.message, 'error');
  }
}

function hideArtifacts() {
  document.getElementById('artifact-panel').style.display = 'none';
}

// ─── WebSocket ───────────────────────────────────────────
async function connectWebSocket() {
  if (ws) { ws.close(); ws = null; }
  try {
    const { ticket } = await api('POST', '/ws-ticket');
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsBase = API.replace(/\/ui\/api$/, '');
    ws = new WebSocket(`${proto}//${location.host}${wsBase}/ws?ticket=${ticket}`);
    ws.onmessage = (e) => {
      try {
        const event = JSON.parse(e.data);
        handleWSEvent(event);
      } catch {}
    };
    ws.onclose = () => {
      // Reconnect after 5s
      setTimeout(() => { if (session) connectWebSocket(); }, 5000);
    };
    ws.onerror = () => {};
  } catch {}
}

function handleWSEvent(event) {
  if (event.type === 'thread_message' && currentView?.type === 'thread' && currentView.id === event.thread_id) {
    // Don't duplicate if we just sent it
    const container = document.getElementById('thread-messages');
    if (container.querySelector(`[data-id="${event.message?.id}"]`)) return;
    const emptyEl = container.querySelector('.list-empty');
    if (emptyEl) emptyEl.remove();
    container.appendChild(createMessageEl(event.message));
    container.scrollTop = container.scrollHeight;
  }
  // Refresh sidebar counts on thread activity
  if (event.type === 'thread_message' || event.type === 'thread_status_changed') {
    // Lightweight refresh — just update the thread in the sidebar
    refreshThreadInSidebar(event.thread_id);
  }
}

async function refreshThreadInSidebar(threadId) {
  try {
    const thread = await api('GET', `/threads/${threadId}`);
    const existing = document.querySelector(`#thread-list .list-item[data-id="${threadId}"]`);
    if (existing) {
      const statusClass = thread.status === 'active' ? 'badge-green' : thread.status === 'resolved' ? 'badge-blue' : 'badge-dim';
      existing.querySelector('.list-item-title').textContent = thread.topic || 'Untitled';
      existing.querySelector('.list-item-meta').innerHTML = `
        <span class="badge ${statusClass}">${esc(thread.status)}</span>
        <span>${timeAgo(thread.last_activity_at || thread.created_at)}</span>
      `;
    }
  } catch {}
}

// ─── Utilities ───────────────────────────────────────────
function highlightActive() {
  document.querySelectorAll('.list-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === currentView?.id);
  });
}

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

// Markdown rendering with XSS protection
const markedInstance = typeof marked !== 'undefined' ? new marked.Marked({
  breaks: true,
  gfm: true,
}) : null;

function renderMarkdown(text) {
  if (!text) return '';
  // Require both marked AND DOMPurify — never render unsanitized HTML
  if (!markedInstance || typeof DOMPurify === 'undefined') {
    return esc(text).replace(/\n/g, '<br>');
  }
  try {
    const raw = markedInstance.parse(text);
    return DOMPurify.sanitize(raw, { ADD_ATTR: ['target'] });
  } catch {
    return esc(text).replace(/\n/g, '<br>');
  }
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(typeof ts === 'number' ? ts : ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' +
    d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function timeAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - (typeof ts === 'number' ? ts : new Date(ts).getTime());
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 30) return `${days}d ago`;
  return new Date(ts).toLocaleDateString([], { month: 'short', day: 'numeric' });
}
