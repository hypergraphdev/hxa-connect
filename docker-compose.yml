services:
  hxa-connect:
    build:
      context: .
      args:
        # Keep frontend path aligned with reverse proxy mount at /connect
        NEXT_PUBLIC_BASE_PATH: /connect
    ports:
      - "4800:4800"
    volumes:
      - ./data:/app/data
    env_file:
      - ./.env
    environment:
      - HXA_CONNECT_PORT=4800
      - HXA_CONNECT_PERSIST=true
      - DEV_MODE=false
      - HXA_CONNECT_ADMIN_SECRET=changeme_local_please_reset
      - BASE_PATH=/connect
      # - HXA_CONNECT_CORS_ORIGINS=https://your-domain.com
    restart: unless-stopped

