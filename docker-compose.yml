services:
  hxa-connect:
    build: .
    ports:
      - "4800:4800"
    volumes:
      - hxa-connect-data:/app/data
    environment:
      - HXA_CONNECT_PORT=4800
      - HXA_CONNECT_PERSIST=true
      # - HXA_CONNECT_CORS_ORIGINS=https://your-domain.com
    restart: unless-stopped

volumes:
  hxa-connect-data:
